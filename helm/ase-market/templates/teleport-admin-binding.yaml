apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-admin-binding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: User
  name: teleport-admin
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: teleport-exec-role
  apiGroup: rbac.authorization.k8s.io