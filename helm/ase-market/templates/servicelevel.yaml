{{- if .Values.serviceLevel.enabled }}
# SLO definition for this release, based on the istio_requests_total metric
# Istio sidecars already emit (no extra instrumentation needed). Requires
# the service-level-operator CRD/operator to be installed cluster-wide -
# see service-level-operator/.
#
# Once applied, service-level-operator computes and exposes:
#   service_level_slo_objective_ratio{service_level="{{ include "ase-market.fullname" . }}", ...}
#   service_level_sli_result_error_ratio_total{...}
#   service_level_sli_result_count_total{...}
# which Grafana dashboard 8793
# (https://grafana.com/grafana/dashboards/8793-service-level-sli-slo/) visualizes.
apiVersion: monitoring.spotahome.com/v1alpha1
kind: ServiceLevel
metadata:
  name: {{ include "ase-market.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ase-market.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  serviceLevelObjectives:
    - name: {{ include "ase-market.fullname" . }}-availability
      description: "{{ .Values.serviceLevel.availabilityObjectivePercent }}% of requests to {{ include "ase-market.fullname" . }} must not return a 5xx response code."
      availabilityObjectivePercent: {{ .Values.serviceLevel.availabilityObjectivePercent }}
      serviceLevelIndicator:
        prometheus:
          address: {{ .Values.serviceLevel.prometheusAddress }}
          totalQuery: |
            sum(rate(istio_requests_total{
              reporter="destination",
              destination_service_name="{{ include "ase-market.fullname" . }}",
              destination_service_namespace="{{ .Release.Namespace }}"
            }[5m]))
          errorQuery: |
            sum(rate(istio_requests_total{
              reporter="destination",
              destination_service_name="{{ include "ase-market.fullname" . }}",
              destination_service_namespace="{{ .Release.Namespace }}",
              response_code=~"5.."
            }[5m]))
      output:
        prometheus: {}
{{- end }}
