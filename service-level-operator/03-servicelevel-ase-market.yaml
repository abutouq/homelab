# SLO definition for ase-market, based on the istio_requests_total metric
# that Istio sidecars already emit for ase-market-helm (no extra
# instrumentation needed - see istio/peer-authentication-ase-market.yaml for
# confirmation the namespace is meshed).
#
# Adjust `serviceLevelIndicator.prometheus.address` to point at your
# Prometheus service, e.g.:
#   kubectl get svc -n monitoring | grep -i prometheus
#
# Once applied, service-level-operator computes and exposes:
#   service_level_slo_objective_ratio{service_level="ase-market", slo="ase-market-availability"}
#   service_level_sli_result_error_ratio_total{...}
#   service_level_sli_result_count_total{...}
# which Grafana dashboard 8793
# (https://grafana.com/grafana/dashboards/8793-service-level-sli-slo/) visualizes.
apiVersion: monitoring.spotahome.com/v1alpha1
kind: ServiceLevel
metadata:
  name: ase-market
  namespace: ase-market-helm
spec:
  serviceLevelObjectives:
    - name: ase-market-availability
      description: "99.9% of requests to ase-market must not return a 5xx response code."
      availabilityObjectivePercent: 99.9
      serviceLevelIndicator:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          totalQuery: |
            sum(rate(istio_requests_total{
              reporter="destination",
              destination_service_name="ase-market-helm",
              destination_service_namespace="ase-market-helm"
            }[5m]))
          errorQuery: |
            sum(rate(istio_requests_total{
              reporter="destination",
              destination_service_name="ase-market-helm",
              destination_service_namespace="ase-market-helm",
              response_code=~"5.."
            }[5m]))
      output:
        prometheus: {}
