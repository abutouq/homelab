# Static CRD for monitoring.spotahome.com/v1alpha1 ServiceLevel.
#
# The operator normally self-registers this CRD on startup, but in a GitOps
# flow ArgoCD applies all manifests without waiting for the operator pod to
# come up and do that - so the ServiceLevel CR (03-servicelevel-ase-market.yaml)
# fails with "could not find monitoring.spotahome.com/ServiceLevel".
#
# Shipping the CRD here, with a lower sync-wave than the CR, lets ArgoCD
# apply it first and wait for it to become Established before anything that
# depends on it - no manual kubectl steps needed on a fresh cluster.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicelevels.monitoring.spotahome.com
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: monitoring.spotahome.com
  scope: Namespaced
  names:
    kind: ServiceLevel
    plural: servicelevels
    singular: servicelevel
    categories:
      - monitoring
      - slo
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
