# RBAC for the external Prometheus (running on host 192.168.0.158, outside
# this cluster - it is NOT one of the k8s nodes in ansible/hosts.ini) to use
# kubernetes_sd_configs for pod discovery. Without this, Prometheus only has
# the static node-exporter/pihole targets in /etc/prometheus/prometheus.yml
# and never sees Istio envoy sidecar metrics (istio_requests_total) or
# service-level-operator's own /metrics - both required for dashboard 8793.
#
# After applying, extract credentials for prometheus.yml on host .158:
#   kubectl get secret prometheus-external-token -n monitoring \
#     -o jsonpath='{.data.token}' | base64 -d
#   kubectl get secret prometheus-external-token -n monitoring \
#     -o jsonpath='{.data.ca\.crt}' | base64 -d
#
# Copy those to /etc/prometheus/k8s-token and /etc/prometheus/k8s-ca.crt on
# .158, then add the kubernetes_sd_configs scrape job referencing them
# (see chat for the prometheus.yml snippet).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-external
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-external
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-external
subjects:
  - kind: ServiceAccount
    name: prometheus-external
    namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-external
---
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-external-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: prometheus-external
type: kubernetes.io/service-account-token
