apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-level-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abutouq/homelab.git
    targetRevision: main
    path: service-level-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
